kind = "web"
previewPath = "/"
title = "Ajoke Gold"
version = "1.0.0"
id = "artifacts/ajoke-gold"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18979

[services.development]
run = "pnpm --filter @workspace/ajoke-gold run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ajoke-gold", "run", "build" ]
publicDir = "artifacts/ajoke-gold/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18979"
BASE_PATH = "/"
